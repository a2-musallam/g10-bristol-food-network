<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Recipe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f8;
        }

        .wrapper {
            max-width: 650px;
            margin: 60px auto;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .card-body {
            padding: 30px;
        }

        h2 {
            font-weight: 600;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
        }

        .btn-main {
            background: #28a745;
            border: none;
            padding: 10px;
            border-radius: 8px;
        }

        .btn-main:hover {
            background: #218838;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-link {
            text-decoration: none;
            color: #666;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <div class="top-bar">
        <h2>Create Recipe</h2>
        <a href="{% url 'producer_products' %}" class="back-link">← Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    {{ form.title }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    {{ form.description }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Ingredients</label>
                    {{ form.ingredients }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Instructions</label>
                    {{ form.instructions }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Season</label>
                    {{ form.season }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Image</label>
                    {{ form.image }}
                </div>

                <div class="mb-4">
                    <label class="form-label">Products Used</label>
                    {{ form.products }}
                </div>

                <button type="submit" class="btn btn-main w-100">
                    Save Recipe
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
