<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Farm Story</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f7f9;">

<div class="container mt-5" style="max-width:700px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🌿 Create Farm Story</h2>
        <a href="{% url 'producer_products' %}" class="btn btn-outline-dark btn-sm">← Back</a>
    </div>

    <div class="card shadow p-4 border-0 rounded-4">
        <p class="text-muted">
            Share seasonal updates, farm news, harvest stories or behind-the-scenes content.
        </p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-success w-100 mt-3">
                Publish Story
            </button>
        </form>
    </div>
</div>

</body>
</html>
