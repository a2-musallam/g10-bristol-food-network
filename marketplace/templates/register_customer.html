<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration - Bristol Food Network</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #f5f7fa, #e9eef5);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        }

        h2 {
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
        }

        input, textarea, select {
            border-radius: 10px !important;
            padding: 10px !important;
            border: 1px solid #ddd !important;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #28a745 !important;
            box-shadow: 0 0 0 0.15rem rgba(40,167,69,0.2) !important;
        }

        .btn-primary {
            background: #28a745;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
        }

        .btn-primary:hover {
            background: #218838;
        }

        .alert-info {
            background: #f0fdf4;
            border: none;
            border-left: 4px solid #28a745;
            border-radius: 10px;
        }

        .link {
            text-decoration: none;
            color: #28a745;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card">

                <h2 class="text-center mb-2">Create Your Account</h2>

                <p class="subtitle text-center mb-4">
                    Join Bristol Food Network 
                </p>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        Create Account
                    </button>
                </form>

                <div class="alert alert-info mt-3">
                    <strong>For organisations?</strong>
                    <br>
                    Community group accounts can access bulk ordering, invoice payments and discounts.
                    <br><br>

                    <a href="{% url 'register_community_group' %}" class="btn btn-outline-success w-100">
                        Register as a Community Group
                    </a>
                </div>

                <div class="mt-3 text-center">
                    <a href="{% url 'login' %}" class="link">
                        Already have an account? Login
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
