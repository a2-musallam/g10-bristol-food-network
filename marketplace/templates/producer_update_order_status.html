<!DOCTYPE html>
<html>
<head>
    <title>Update Order Status</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f7f7f7; }
        .box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; max-width: 700px; }
        textarea, select { width: 100%; padding: 8px; margin-top: 6px; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h1>Other Updates for Order #{{ order.id }}</h1>

    <p><strong>Current status:</strong> {{ order.get_status_display }}</p>

    <form method="post">
        {% csrf_token %}

        {% if allowed_statuses %}
            <label for="status"><strong>Change Status</strong></label>
            <select name="status" id="status">
                {% for value in allowed_statuses %}
                    <option value="{{ value }}">
                        {% if value == "cancelled" %}Cancelled{% endif %}
                        {% if value == "confirmed" %}Confirmed{% endif %}
                        {% if value == "ready" %}Ready for Collection / Delivery{% endif %}
                        {% if value == "delivered" %}Delivered{% endif %}
                    </option>
                {% endfor %}
            </select>
        {% else %}
            <p><em>No alternative status transitions available for this stage.</em></p>
        {% endif %}

        <label for="status_note"><strong>Add/Update Note for customer</strong></label>
        <textarea name="status_note" id="status_note" rows="4">{{ order.status_note|default:'' }}</textarea>

        <button type="submit" class="btn btn-primary">Save Update</button>
    </form>

    <p><a href="{% url 'producer_orders' %}">← Back to producer orders</a></p>
</div>

</body>
</html>
