<!DOCTYPE html>
<html>
<head>
  <title>Marketplace</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 12px; }
    .allergen { margin-top: 8px; padding: 8px; border: 1px solid #c00000; background: #fff0f0; border-radius: 6px; }
    a { text-decoration: none; }
  </style>
</head>
<body>

  <h1>Marketplace</h1>

  {% if products %}
    {% for p in products %}
      <div class="card">
        <h2>
          <a href="{% url 'product_detail' p.pk %}">{{ p.name }}</a>
        </h2>

        <p><strong>Price:</strong> £{{ p.price }}</p>
        <p><strong>Stock:</strong> {{ p.stock }}</p>

        <div class="allergen">
          <strong>Allergens:</strong>
          {% if p.allergens %}
            {{ p.allergens }}
          {% else %}
            No common allergens
          {% endif %}
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>No products yet.</p>
  {% endif %}

</body>
</html>
