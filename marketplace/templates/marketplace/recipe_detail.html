<!DOCTYPE html>
<html>
<head>
    <title>{{ recipe.title }}</title>
</head>
<body>
    <h1>{{ recipe.title }}</h1>

    {% if recipe.image %}
        <img src="{{ recipe.image.url }}" width="400">
    {% endif %}

    <p><strong>Season:</strong> {{ recipe.get_season_display }}</p>

    <h2>Description</h2>
    <p>{{ recipe.description }}</p>

    <h2>Ingredients</h2>
    <p>{{ recipe.ingredients|linebreaks }}</p>

    <h2>Instructions</h2>
    <p>{{ recipe.instructions|linebreaks }}</p>

    <p><a href="javascript:history.back()">← Back</a></p>
</body>
</html>
