<!DOCTYPE html>
<html>
<head>
    <title>{{ recipe.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            background: #f7f7f7;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        h1 {
            margin-top: 0;
        }

        .section {
            margin-top: 25px;
        }

        pre {
            white-space: pre-wrap;
            font-family: Arial, sans-serif;
        }

        img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>{{ recipe.title }}</h1>

    <p><strong>Season:</strong> {{ recipe.get_season_display }}</p>

    {% if recipe.image %}
        <img src="{{ recipe.image.url }}" alt="{{ recipe.title }}">
    {% endif %}

    <div class="section">
        <h3>Ingredients</h3>
        <pre>{{ recipe.ingredients }}</pre>
    </div>

    <div class="section">
        <h3>Cooking Instructions</h3>
        <pre>{{ recipe.instructions }}</pre>
    </div>

    <p style="margin-top: 30px;">
        <a href="{% url 'product_detail' recipe.products.first.id %}">
            ← Back to Product
        </a>
    </p>
</div>

</body>
</html>
