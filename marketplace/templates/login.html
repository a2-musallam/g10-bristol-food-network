<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Bristol Food Network</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card bg-light text-dark shadow p-4">
                <h2 class="text-center mb-4">Login</h2>
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-info">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Secure Login</button>
                </form>
                <hr>
                <p class="small text-center">New here? <br>
                    <a href="{% url 'register_producer' %}">Register as Producer</a> | 
                    <a href="{% url 'register_customer' %}">Register as Customer</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
