<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<style>
body{
font-family:Arial;
max-width:900px;
margin:40px auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:5px 10px;
}

.checkout{
margin-top:20px;
}
</style>

</head>
<body>

<h1>Shopping Cart</h1>

{% if items %}

<table>

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Subtotal</th>
<th>Action</th>
</tr>

{% for item in items %}

<tr>

<td>{{ item.product.name }}</td>

<td>£{{ item.product.price }}</td>

<td>

<form action="{% url 'update_cart' item.id %}" method="POST">
{% csrf_token %}

<input type="number"
name="quantity"
value="{{ item.quantity }}"
min="1">

<button type="submit">Update</button>

</form>

</td>

<td>£{{ item.subtotal }}</td>

<td>

<a href="{% url 'remove_cart' item.id %}">
Remove
</a>

</td>

</tr>

{% endfor %}

</table>

<h2>Total: £{{ total }}</h2>

<div class="checkout">

<a href="/checkout/">
<button>Proceed to Checkout</button>
</a>

</div>

{% else %}

<p>Your cart is empty.</p>

{% endif %}

<br>

<a href="/">← Back to Marketplace</a>

</body>
</html>
